services:
  backend:
    build: ./backend
    ports:
      - 8000:8000

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - 8501:8501

  database:
    ports:
      - 3306:3306
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD= ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
